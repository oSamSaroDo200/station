<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานสรุป — ปั๊มน้ำมัน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--border:#2d3547;--accent:#f0a500;--accent2:#e05c2a;--green:#3fb950;--red:#f85149;--blue:#58a6ff;--text:#e6edf3;--muted:#8b949e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;min-height:100vh;}
.gs-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100;}
.gs-header-top{display:flex;align-items:center;justify-content:space-between;padding:11px 0;gap:10px;flex-wrap:wrap;}
.gs-logo{display:flex;align-items:center;gap:9px;}
.gs-logo-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.gs-logo-name{font-size:15px;font-weight:700;}
.gs-logo-sub{font-size:10px;color:var(--muted);}
.gs-nav{display:flex;}
.gs-nav-item{padding:9px 16px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;transition:color 0.15s,border-color 0.15s;white-space:nowrap;}
.gs-nav-item:hover{color:var(--text);}
.gs-nav-item.active{color:var(--accent);border-bottom-color:var(--accent);}
.btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-pdf{background:var(--accent2);color:#fff;}.btn-pdf:hover{background:#f06030;}
main{padding:22px 20px;}
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 15px;border-top:2px solid transparent;}
.stat-card.ca{border-top-color:var(--accent);}.stat-card.cb{border-top-color:var(--blue);}.stat-card.cg{border-top-color:var(--green);}.stat-card.cr{border-top-color:var(--red);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.filter-bar{background:var(--surface2);border-radius:9px;padding:11px 15px;margin-bottom:20px;display:flex;align-items:center;gap:11px;flex-wrap:wrap;}
.filter-bar label{font-size:12px;color:var(--muted);white-space:nowrap;}
.filter-bar select,.filter-bar input[type="date"]{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 9px;cursor:pointer;}
.filter-bar select:focus,.filter-bar input[type="date"]:focus{outline:none;border-color:var(--accent);}
#status_bar{margin-left:auto;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:24px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--surface2);padding:9px 12px;text-align:right;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;white-space:nowrap;border-bottom:1px solid var(--border);}
thead th:first-child{text-align:left;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.02);}
tbody td{padding:9px 12px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;}
tbody td:first-child{text-align:left;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;}
tbody td.positive{color:var(--green);}tbody td.negative{color:var(--red);}tbody td.neutral{color:var(--muted);}
tfoot td{padding:9px 12px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;background:var(--surface2);color:var(--accent);border-top:2px solid var(--accent);}
tfoot td:first-child{text-align:left;font-family:'Sarabun',sans-serif;font-size:13px;}
.diff-ok{color:var(--green);}.diff-bad{color:var(--red);}
.month-section{margin-bottom:32px;}
.month-title{font-size:12px;font-weight:700;color:var(--accent);background:rgba(240,165,0,0.08);border:1px solid rgba(240,165,0,0.3);border-radius:6px;padding:4px 12px;display:inline-block;margin-bottom:10px;}
.fuel-bar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:24px;}
.fuel-bar-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;}
#loading{text-align:center;padding:60px 24px;color:var(--muted);font-size:15px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.print-header{display:none;}
.badge-ok{background:rgba(63,185,80,0.15);color:var(--green);display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-warn{background:rgba(240,165,0,0.15);color:var(--accent);display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-bad{background:rgba(248,81,73,0.15);color:var(--red);display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;}
@media print{
  body{background:#fff;color:#111;font-size:10pt;}
  .gs-header,.filter-bar,.no-print{display:none!important;}
  main{max-width:none;padding:0;}
  .print-header{display:block!important;text-align:center;margin-bottom:14px;border-bottom:2px solid #f0a500;padding-bottom:8px;}
  .print-header h1{font-size:15pt;font-weight:700;}
  .print-header p{font-size:9pt;color:#6c757d;}
  .stat-card{background:#f8f9fa!important;border:1px solid #dee2e6!important;}
  .stat-label{color:#6c757d!important;}.stat-value{color:#111!important;}
  thead th{background:#f1f3f5!important;color:#495057!important;border-bottom:2px solid #dee2e6!important;}
  tfoot td{background:#fff3cd!important;color:#856404!important;border-top:2px solid #f0a500!important;}
  .table-wrap{border:1px solid #dee2e6!important;border-radius:0!important;}
  .stat-strip{grid-template-columns:repeat(4,1fr)!important;}
  .fuel-bar-grid{grid-template-columns:repeat(3,1fr)!important;}
  @page{margin:10mm 12mm;size:A4 landscape;}
}
@media(max-width:820px){
  .stat-strip{grid-template-columns:repeat(2,1fr);}
  .fuel-bar-grid{grid-template-columns:1fr;}
  main{padding:14px 12px;}
}

/* ── LIGHT MODE ── */
body.light{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0ede8;--border:#ddd8d0;
  --text:#1a1a1a;--muted:#6b7280;--accent:#d4920a;--accent2:#c04e20;
  --green:#1a7f37;--red:#c0392b;--blue:#1a56a4;
}
body.light .gs-header{background:#fff;border-color:#ddd8d0;}
body.light .filter-bar select,body.light .filter-bar input[type="date"]{background:#fff;color:#1a1a1a;border-color:#ddd8d0;}
body.light table thead th{background:#f0ede8;}
body.light tbody tr:hover{background:rgba(0,0,0,0.02);}
body.light tfoot td{background:#fef9ec;}
body.light .stat-card{background:#fff;}
body.light .table-wrap{border-color:#ddd8d0;}
body.light .filter-bar{background:#f0ede8;}
body.light .month-section .month-title{background:rgba(212,146,10,0.1);border-color:rgba(212,146,10,0.4);}
/* toggle button */
.theme-toggle{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all 0.2s;flex-shrink:0;}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
/* csv button */
.btn-csv{background:rgba(63,185,80,0.12);color:var(--green);border:1px solid rgba(63,185,80,0.4);}
.btn-csv:hover{background:rgba(63,185,80,0.22);}
body.light .btn-csv{background:rgba(26,127,55,0.1);color:var(--green);border-color:rgba(26,127,55,0.4);}
body.light .btn-ghost{border-color:var(--border);color:var(--text);}
body.light .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
body.light .btn-pdf{background:var(--accent2);color:#fff;}
body.light #status_bar{color:var(--muted);}
/* print always light */
@media print{body,body.light{background:#fff!important;color:#111!important;}}


.chart-tab{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'Sarabun',sans-serif;cursor:pointer;transition:all 0.15s;}
.chart-tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:700;}
.chart-tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}
@media(max-width:820px){.chart-legend{gap:9px;}}

/* ── SIDEBAR LAYOUT ── */
.gs-layout{display:flex;min-height:100vh;}
.gs-sidebar{width:216px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;padding:14px 10px;z-index:200;transform:translateX(-216px);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);box-shadow:4px 0 24px rgba(0,0,0,0.25);}
body.sidebar-open .gs-sidebar{transform:translateX(0);}
.gs-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:199;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
body.sidebar-open .gs-backdrop{display:block;}
.gs-sidebar-top{display:flex;align-items:center;gap:9px;padding:4px 8px;margin-bottom:4px;}
.gs-sidebar-divider{height:1px;background:var(--border);margin:10px 0;}
.gs-nav{display:flex;flex-direction:column;gap:2px;flex:1;}
.gs-nav-item{padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:9px;transition:all 0.15s;border-bottom:none!important;white-space:nowrap;}
.gs-nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.gs-nav-item.active{background:rgba(240,165,0,0.12);color:var(--accent);}
.gs-sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.gs-main{margin-left:0;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.gs-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
body.light .gs-sidebar{background:#fff;border-color:#ddd8d0;}
body.light .gs-topbar{background:#fff;border-color:#ddd8d0;}
body.light .gs-nav-item:hover{background:rgba(0,0,0,0.04);}
body.light .gs-nav-item.active{background:rgba(212,146,10,0.1);}
body.light .gs-backdrop{background:rgba(0,0,0,0.3);}
.btn-menu{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all 0.2s;flex-shrink:0;}
.btn-menu:hover{border-color:var(--accent);color:var(--accent);}

</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <div id="setup_card" style="display:none;">
    <div style="background:var(--surface);border:1px solid var(--red);border-radius:12px;padding:26px;max-width:440px;margin:60px auto;text-align:center;">

      <h2 style="font-size:17px;margin-bottom:9px;">ไม่สามารถเชื่อมต่อ Firebase</h2>

<script>
const MONTHS_TH=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var sheetData={};
function fmt(n,dec=2){if(n===null||n===undefined||isNaN(n))return'—';return n.toLocaleString('th-TH',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function parseKey(k){const p=k.split('-');return{day:parseInt(p[0]),month:parseInt(p[1]),year2:parseInt(p[2]),shift:p[3]||''};}
function keyToDate(k){const p=parseKey(k);const yearCE=(p.year2<100?2500+p.year2:p.year2)-543;return new Date(yearCE,p.month-1,p.day);}
function fmtKey(k){const p=parseKey(k);const si=p.shift==='m'?' ☀️':p.shift==='e'?' 🌙':'';return`${String(p.day).padStart(2,'0')} ${MONTHS_TH[p.month]} 25${String(p.year2).padStart(2,'0')}${si}`;}
function monthGroupKey(k){const p=parseKey(k);return`${p.month}-${p.year2}`;}
function monthLabel(mg){const[m,y]=mg.split('-').map(Number);return`${MONTHS_TH[m]} 25${String(y).padStart(2,'0')}`;}
function computeDay(d){
  const disc=d.disc??0.5,change=d.change??3700;
  const g95n_l=Math.max(0,(d.g95n_close||0)-(d.g95n_open||0)),g95l_l=Math.max(0,(d.g95l_close||0)-(d.g95l_open||0));const g95_l=g95n_l+g95l_l;const g95_sale=g95_l*(d.g95_price||0);
  const g91n_l=Math.max(0,(d.g91n_close||0)-(d.g91n_open||0)),g91l_l=Math.max(0,(d.g91l_close||0)-(d.g91l_open||0));const g91_l=g91n_l+g91l_l;const g91_sale=g91_l*(d.g91_price||0);
  const dn_l=Math.max(0,(d.dn_close||0)-(d.dn_open||0)),dl_l=Math.max(0,(d.dl_close||0)-(d.dl_open||0));const d3_l=dn_l+dl_l;const dp=d.d_price||0;const d3_sale=d3_l*dp;
  const d4n_l=Math.max(0,(d.d4n_close||0)-(d.d4n_open||0)),d4l_l=Math.max(0,(d.d4l_close||0)-(d.d4l_open||0));const d4_l=d4n_l+d4l_l;const d4p=d.d4_price||dp;const d4_sale=d4_l*d4p;
  const air_l=d.air_liter||0,air_p=d.air_price_custom||dp,_ad=d.air_disc_custom!==undefined&&d.air_disc_custom!==''&&d.air_disc_custom!==null?parseFloat(d.air_disc_custom)||0:disc;const air_net=air_l*(air_p-_ad);
  const totalFuelFull=g95_sale+g91_sale+d3_sale+d4_sale,totalLiter=g95_l+g91_l+d3_l+d4_l;
  const cashTotal=computeCash(d)+computeTransfer(d);const mustSend=cashTotal-change;const diff=mustSend-totalFuelFull;
  const in_g95=d.tank_in_g95||d.in_g95||0,in_g91=d.tank_in_g91||d.in_g91||0,in_d=d.tank_in_d||d.in_d||0;
  return{g95_l,g95_sale,g91_l,g91_sale,d3_l,d3_sale,d4_l,d4_sale,air_l,air_net,totalFuelFull,totalLiter,cashTotal,mustSend,diff,change,disc,in_g95,in_g91,in_d};
}
function computeCash(d){if(!d.cash)return 0;const denoms=[1000,500,100,50,20,10,5,2,1];return denoms.reduce((s,v)=>{const qty=d.cash[String(v)]??d.cash[v]??0;return s+qty*v;},0);}
function computeTransfer(d){if(!d.transfer)return 0;return d.transfer.reduce((s,r)=>s+(r.amount||0),0);}
function getFilteredKeys(){
  const month=document.getElementById('filter_month')?.value||'',from=document.getElementById('filter_from')?.value,to=document.getElementById('filter_to')?.value;
  return Object.keys(sheetData).filter(k=>{
    if(month&&monthGroupKey(k)!==month)return false;
    if(from||to){const d=keyToDate(k);if(from){const[fy,fm,fd]=from.split('-').map(Number);if(d<new Date(fy,fm-1,fd))return false;}if(to){const[ty,tm,td]=to.split('-').map(Number);if(d>new Date(ty,tm-1,td))return false;}}
    return true;
  });
}
function clearFilters(){document.getElementById('filter_month').value='';document.getElementById('filter_from').value='';document.getElementById('filter_to').value='';render();}
function populateMonthFilter(){
  const sel=document.getElementById('filter_month');
  const groups=[...new Set(Object.keys(sheetData).map(monthGroupKey))].sort((a,b)=>{const[am,ay]=a.split('-').map(Number),[bm,by]=b.split('-').map(Number);if(ay!==by)return ay-by;return am-bm;});
  sel.innerHTML='<option value="">ทุกเดือน</option>';
  groups.forEach(g=>{const opt=document.createElement('option');opt.value=g;opt.textContent=monthLabel(g);sel.appendChild(opt);});
}
function render(){
  const keys=getFilteredKeys();const body=document.getElementById('report_body');const empty=document.getElementById('empty');
  const uniqueDays=new Set(keys.map(k=>{const p=parseKey(k);return`${p.day}-${p.month}-${p.year2}`;})).size;
  document.getElementById('status_bar').textContent=`แสดง ${uniqueDays} วัน (${keys.length} กะ) จาก ${Object.keys(sheetData).length} records`;
  if(keys.length===0){body.style.display='none';empty.style.display='block';return;}
  empty.style.display='none';body.style.display='block';
  keys.sort((a,b)=>{const pa=parseKey(a),pb=parseKey(b);if(pa.year2!==pb.year2)return pa.year2-pb.year2;if(pa.month!==pb.month)return pa.month-pb.month;if(pa.day!==pb.day)return pa.day-pb.day;const so={'m':0,'e':1,'':0};return(so[pa.shift]||0)-(so[pb.shift]||0);});
  let totG95sale=0,totG91sale=0,totD3sale=0,totD4sale=0,totG95l=0,totG91l=0,totD3l=0,totD4l=0,totFull=0,totSend=0,totDiff=0,daysOver=0,daysShort=0,daysExact=0;
  keys.forEach(k=>{const c=computeDay(sheetData[k]);totG95sale+=c.g95_sale;totG91sale+=c.g91_sale;totD3sale+=c.d3_sale;totD4sale+=c.d4_sale;totG95l+=c.g95_l;totG91l+=c.g91_l;totD3l+=c.d3_l;totD4l+=c.d4_l;totFull+=c.totalFuelFull;totSend+=c.mustSend;totDiff+=c.diff;if(Math.abs(c.diff)<0.01)daysExact++;else if(c.diff>=0)daysOver++;else daysShort++;});
  const totLiter=totG95l+totG91l+totD3l+totD4l;
  let html='';
  html+=`<div class="stat-strip">
    <div class="stat-card ca"><div class="stat-label">รวมยอดน้ำมัน</div><div class="stat-value" style="color:var(--accent);">${fmt(totFull)}</div><div class="stat-sub">${fmt(totLiter)} ลิตร รวม</div></div>
    <div class="stat-card cb"><div class="stat-label">ยอดส่งรวม</div><div class="stat-value" style="color:var(--blue);">${fmt(totSend)}</div><div class="stat-sub">${uniqueDays} วัน · ${keys.length} กะ</div></div>
    <div class="stat-card ${totDiff>=0?'cg':'cr'}"><div class="stat-label">ผลต่างรวม</div><div class="stat-value" style="color:${totDiff>=0?'var(--green)':'var(--red)'};">${fmt(Math.abs(totDiff))}</div><div class="stat-sub">${totDiff>=0?'▲ เกินรวม':'▼ ขาดรวม'}</div></div>
    <div class="stat-card"><div class="stat-label">ตรง / เกิน / ขาด</div><div style="display:flex;gap:5px;margin-top:5px;"><span class="badge-ok">${daysExact}</span><span class="badge-warn">${daysOver}</span><span class="badge-bad">${daysShort}</span></div><div class="stat-sub" style="margin-top:4px;">ตรง / เกิน / ขาด</div></div>
  </div>`;
  html+=`<div class="section-label"><svg xmlns="http://www.w3.org/2000/svg" style="width:12px;height:12px;stroke-width:2;display:inline;vertical-align:-1px;margin-right:5px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>สรุปแยกตามประเภทน้ำมัน</div><div class="fuel-bar-grid">${[{label:'G95 · ตู้ 1',sale:totG95sale,liter:totG95l,color:'var(--red)'},{label:'G91 · ตู้ 2',sale:totG91sale,liter:totG91l,color:'var(--green)'},{label:'Diesel · ตู้ 3+4',sale:totD3sale+totD4sale,liter:totD3l+totD4l,color:'var(--blue)'}].map(f=>`<div class="fuel-bar-card"><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${f.color};margin-bottom:7px;">${f.label}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;">${fmt(f.sale)} <span style="font-size:10px;color:var(--muted);">฿</span></div><div style="font-size:10px;color:var(--muted);margin-top:2px;">${fmt(f.liter)} ลิตร</div></div>`).join('')}</div>`;
  const groupMap={};keys.forEach(k=>{const g=monthGroupKey(k);if(!groupMap[g])groupMap[g]=[];groupMap[g].push(k);});
  const sortedGroupEntries=Object.entries(groupMap).sort(([a],[b])=>{const[am,ay]=a.split('-').map(Number),[bm,by]=b.split('-').map(Number);if(ay!==by)return ay-by;return am-bm;});
  html+=`<div class="section-label"><svg xmlns="http://www.w3.org/2000/svg" style="width:12px;height:12px;stroke-width:2;display:inline;vertical-align:-1px;margin-right:5px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>รายละเอียดรายวัน</div>`;
  sortedGroupEntries.forEach(([gk,dayKeys])=>{
    let mG95=0,mG91=0,mD3=0,mD4=0,mFull=0,mSend=0,mDiff=0;
    const rows=dayKeys.map(k=>{const c=computeDay(sheetData[k]);mG95+=c.g95_sale;mG91+=c.g91_sale;mD3+=c.d3_sale;mD4+=c.d4_sale;mFull+=c.totalFuelFull;mSend+=c.mustSend;mDiff+=c.diff;
      const diffClass=Math.abs(c.diff)<0.01?'neutral':c.diff>=0?'positive':'negative';const diffTxt=Math.abs(c.diff)<0.01?'ตรง':(c.diff>0?'+':'-')+fmt(Math.abs(c.diff));
      return`<tr><td>${fmtKey(k)}</td><td>${fmt(c.g95_sale)}</td><td style="color:var(--muted)">${fmt(c.g95_l,2)}</td><td>${fmt(c.g91_sale)}</td><td style="color:var(--muted)">${fmt(c.g91_l,2)}</td><td>${fmt(c.d3_sale+c.d4_sale)}</td><td style="color:var(--muted)">${fmt(c.d3_l+c.d4_l,2)}</td><td>${fmt(c.totalFuelFull)}</td><td>${fmt(c.totalLiter,2)}</td><td>${fmt(c.mustSend)}</td><td class="${diffClass}">${diffTxt}</td></tr>`;
    }).join('');
    const mDiffClass=Math.abs(mDiff)<0.01?'':mDiff>=0?'diff-ok':'diff-bad';const mDiffTxt=Math.abs(mDiff)<0.01?'ตรง':(mDiff>0?'+':'-')+fmt(Math.abs(mDiff));
    html+=`<div class="month-section"><div class="month-title">${monthLabel(gk)}</div><div class="table-wrap"><table><thead><tr><th>วันที่</th><th>G95 (฿)</th><th>ลิตร</th><th>G91 (฿)</th><th>ลิตร</th><th>Diesel (฿)</th><th>ลิตร</th><th>รวม (฿)</th><th>รวมลิตร</th><th>ยอดส่ง (฿)</th><th>ผลต่าง</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td>รวม ${monthLabel(gk)}</td><td>${fmt(mG95)}</td><td></td><td>${fmt(mG91)}</td><td></td><td>${fmt(mD3+mD4)}</td><td></td><td>${fmt(mFull)}</td><td></td><td>${fmt(mSend)}</td><td class="${mDiffClass}">${mDiffTxt}</td></tr></tfoot></table></div></div>`;
  });
  if(Object.keys(groupMap).length>1){
    const gc=Math.abs(totDiff)<0.01?'':totDiff>=0?'diff-ok':'diff-bad';const gt=Math.abs(totDiff)<0.01?'ยอดตรง ✓':(totDiff>0?'+':'-')+fmt(Math.abs(totDiff))+' ฿';
    html+=`<div style="background:var(--surface2);border:1px solid var(--accent);border-radius:11px;padding:18px 22px;display:flex;flex-wrap:wrap;gap:22px;align-items:center;margin-bottom:24px;"><div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">ยอดรวมทั้งหมด</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--accent)">${fmt(totFull)} ฿</div><div style="font-size:11px;color:var(--muted);">${fmt(totLiter)} ลิตร · ${uniqueDays} วัน (${keys.length} กะ)</div></div><div style="width:1px;height:48px;background:var(--border);"></div><div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">ยอดส่งรวม</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;">${fmt(totSend)} ฿</div></div><div style="width:1px;height:48px;background:var(--border);"></div><div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">ผลต่างรวม</div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;" class="${gc}">${gt}</div></div></div>`;
  }
  body.innerHTML=html;
  document.getElementById('print_subtitle').textContent=`พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')} · แสดง ${keys.length} กะ`;
  renderCharts();
}

// ── EXPORT CSV ──
const MONTHS_TH_CSV=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function exportCSV(){
  const monthVal=document.getElementById('filter_month')?.value||'';
  const keys=getFilteredKeys();
  if(keys.length===0){alert('ไม่มีข้อมูลในช่วงที่เลือก');return;}
  
  // header row
  const rows=[['วันที่','กะ','G95 (ลิตร)','G95 (฿)','G91 (ลิตร)','G91 (฿)','Diesel ตู้3 (ลิตร)','Diesel ตู้4 (ลิตร)','Diesel รวม (ลิตร)','Diesel รวม (฿)','รวมน้ำมัน (ลิตร)','รวมน้ำมัน (฿)','เงินทอน','ยอดที่ส่ง','ผลต่าง','Promo (ลิตร)','Promo สุทธิ (฿)']];
  
  keys.sort((a,b)=>{const pa=parseKey(a),pb=parseKey(b);if(pa.year2!==pb.year2)return pa.year2-pb.year2;if(pa.month!==pb.month)return pa.month-pb.month;if(pa.day!==pb.day)return pa.day-pb.day;const so={'m':0,'e':1,'':0};return(so[pa.shift]||0)-(so[pb.shift]||0);});

  keys.forEach(k=>{
    const d=sheetData[k];const c=computeDay(d);
    const pk=parseKey(k);
    const dateStr=`${String(pk.day).padStart(2,'0')} ${MONTHS_TH_CSV[pk.month]} 25${String(pk.year2).padStart(2,'0')}`;
    const shiftStr=pk.shift==='m'?'กะเช้า':pk.shift==='e'?'กะเย็น':'';
    rows.push([
      dateStr,shiftStr,
      c.g95_l.toFixed(2),c.g95_sale.toFixed(2),
      c.g91_l.toFixed(2),c.g91_sale.toFixed(2),
      c.d3_l.toFixed(2),c.d4_l.toFixed(2),(c.d3_l+c.d4_l).toFixed(2),(c.d3_sale+c.d4_sale).toFixed(2),
      c.totalLiter.toFixed(2),c.totalFuelFull.toFixed(2),
      c.change.toFixed(2),c.mustSend.toFixed(2),c.diff.toFixed(2),
      c.air_l.toFixed(2),c.air_net.toFixed(2)
    ]);
  });

  // summary row
  const totG95l=keys.reduce((s,k)=>s+computeDay(sheetData[k]).g95_l,0);
  const totG95s=keys.reduce((s,k)=>s+computeDay(sheetData[k]).g95_sale,0);
  const totG91l=keys.reduce((s,k)=>s+computeDay(sheetData[k]).g91_l,0);
  const totG91s=keys.reduce((s,k)=>s+computeDay(sheetData[k]).g91_sale,0);
  const totD3l=keys.reduce((s,k)=>s+computeDay(sheetData[k]).d3_l,0);
  const totD4l=keys.reduce((s,k)=>s+computeDay(sheetData[k]).d4_l,0);
  const totDs=keys.reduce((s,k)=>s+computeDay(sheetData[k]).d3_sale+computeDay(sheetData[k]).d4_sale,0);
  const totFull=keys.reduce((s,k)=>s+computeDay(sheetData[k]).totalFuelFull,0);
  const totL=keys.reduce((s,k)=>s+computeDay(sheetData[k]).totalLiter,0);
  const totSend=keys.reduce((s,k)=>s+computeDay(sheetData[k]).mustSend,0);
  const totDiff=keys.reduce((s,k)=>s+computeDay(sheetData[k]).diff,0);
  rows.push(['รวม','',totG95l.toFixed(2),totG95s.toFixed(2),totG91l.toFixed(2),totG91s.toFixed(2),totD3l.toFixed(2),totD4l.toFixed(2),(totD3l+totD4l).toFixed(2),totDs.toFixed(2),totL.toFixed(2),totFull.toFixed(2),'',totSend.toFixed(2),totDiff.toFixed(2),'','']);

  const csvContent='﻿'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const pk=monthVal?monthVal.replace('-','_'):'all';
  a.href=url;a.download=`gas_station_${pk}.csv`;a.click();
  URL.revokeObjectURL(url);
}


// ── CHART ──
let _salesChart=null, _literChart=null, _chartType='line';

function switchChartType(type){
  _chartType=type;
  document.getElementById('tab_line').classList.toggle('active',type==='line');
  document.getElementById('tab_bar').classList.toggle('active',type==='bar');
  renderCharts();
}

function getChartColors(alpha=1){
  const isLight=document.body.classList.contains('light');
  return{
    gridColor: isLight ? 'rgba(0,0,0,0.07)' : 'rgba(255,255,255,0.06)',
    tickColor: isLight ? '#6b7280' : '#8b949e',
    tooltipBg: isLight ? '#fff' : '#1c2330',
    tooltipBorder: isLight ? '#ddd8d0' : '#2d3547',
    tooltipText: isLight ? '#1a1a1a' : '#e6edf3',
  };
}

function buildChartDefaults(){
  const c=getChartColors();
  return{
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:c.tooltipBg,
        borderColor:c.tooltipBorder,
        borderWidth:1,
        titleColor:c.tooltipText,
        bodyColor:c.tooltipText,
        padding:10,
        callbacks:{
          label:ctx=>{
            const v=ctx.raw;
            if(v===0||v===null)return null;
            return ` ${ctx.dataset.label}: ${v.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
          }
        }
      }
    },
    scales:{
      x:{
        grid:{color:c.gridColor},
        ticks:{color:c.tickColor,font:{size:10},maxRotation:45}
      },
      y:{
        grid:{color:c.gridColor},
        ticks:{color:c.tickColor,font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}
      }
    }
  };
}

function renderCharts(){
  const monthVal=document.getElementById('filter_month')?.value||'';
  const keys=getFilteredKeys();
  const section=document.getElementById('chart_section');

  if(keys.length===0){section.style.display='none';return;}
  section.style.display='block';

  // Sort keys
  keys.sort((a,b)=>{
    const pa=parseKey(a),pb=parseKey(b);
    if(pa.year2!==pb.year2)return pa.year2-pb.year2;
    if(pa.month!==pb.month)return pa.month-pb.month;
    if(pa.day!==pb.day)return pa.day-pb.day;
    const so={'m':0,'e':1,'':0};return(so[pa.shift]||0)-(so[pb.shift]||0);
  });

  // Group by day (merge shifts)
  const dayMap={};
  keys.forEach(k=>{
    const p=parseKey(k);
    const dk=`${p.day}-${p.month}-${p.year2}`;
    if(!dayMap[dk])dayMap[dk]={g95:0,g91:0,d:0,total:0,label:''};
    const c=computeDay(sheetData[k]);
    dayMap[dk].g95+=c.g95_sale;
    dayMap[dk].g91+=c.g91_sale;
    dayMap[dk].d+=c.d3_sale+c.d4_sale;
    dayMap[dk].total+=c.totalFuelFull;
    dayMap[dk].g95l=(dayMap[dk].g95l||0)+c.g95_l;
    dayMap[dk].g91l=(dayMap[dk].g91l||0)+c.g91_l;
    dayMap[dk].dl=(dayMap[dk].dl||0)+c.d3_l+c.d4_l;
    const MONTHS_SHORT=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    dayMap[dk].label=`${p.day} ${MONTHS_SHORT[p.month]}`;
  });

  const days=Object.keys(dayMap);
  const labels=days.map(d=>dayMap[d].label);
  const g95Data=days.map(d=>dayMap[d].g95);
  const g91Data=days.map(d=>dayMap[d].g91);
  const dData=days.map(d=>dayMap[d].d);
  const totalData=days.map(d=>dayMap[d].total);
  const g95lData=days.map(d=>dayMap[d].g95l);
  const g91lData=days.map(d=>dayMap[d].g91l);
  const dlData=days.map(d=>dayMap[d].dl);

  // Label
  const lbl=document.getElementById('chart_month_label');
  if(monthVal&&lbl){
    const[m,y]=monthVal.split('-').map(Number);
    const ML=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    lbl.textContent=`· ${ML[m]} 25${String(y).padStart(2,'0')}`;
  }else if(lbl){lbl.textContent=`· ทุกช่วง (${days.length} วัน)`;}

  const defaults=buildChartDefaults();
  const t=_chartType;

  // ── Sales Chart ──
  if(_salesChart){_salesChart.destroy();_salesChart=null;}
  const ctx1=document.getElementById('salesChart').getContext('2d');
  const commonLine={tension:0.35,pointRadius:3,pointHoverRadius:6,borderWidth:2,fill:false};
  const commonBar={borderRadius:4,borderSkipped:false};
  _salesChart=new Chart(ctx1,{
    type:t,
    data:{
      labels,
      datasets:[
        {label:'G95',data:g95Data,...(t==='line'?commonLine:commonBar),borderColor:'#f85149',backgroundColor:t==='line'?'rgba(248,81,73,0.15)':'rgba(248,81,73,0.75)'},
        {label:'G91',data:g91Data,...(t==='line'?commonLine:commonBar),borderColor:'#3fb950',backgroundColor:t==='line'?'rgba(63,185,80,0.15)':'rgba(63,185,80,0.75)'},
        {label:'Diesel',data:dData,...(t==='line'?commonLine:commonBar),borderColor:'#58a6ff',backgroundColor:t==='line'?'rgba(88,166,255,0.15)':'rgba(88,166,255,0.75)'},
        {label:'รวม',data:totalData,...(t==='line'?{...commonLine,borderWidth:2.5,borderDash:[],pointRadius:4}:commonBar),borderColor:'#f0a500',backgroundColor:t==='line'?'rgba(240,165,0,0.1)':'rgba(240,165,0,0.75)'},
      ]
    },
    options:{...defaults,scales:{...defaults.scales,y:{...defaults.scales.y,ticks:{...defaults.scales.y.ticks,callback:v=>v>=1000?'฿'+(v/1000).toFixed(1)+'k':'฿'+v}}}}
  });

  // ── Liter Chart (stacked bar always) ──
  if(_literChart){_literChart.destroy();_literChart=null;}
  const ctx2=document.getElementById('literChart').getContext('2d');
  _literChart=new Chart(ctx2,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'G95',data:g95lData,backgroundColor:'rgba(248,81,73,0.75)',borderRadius:3,stack:'s'},
        {label:'G91',data:g91lData,backgroundColor:'rgba(63,185,80,0.75)',borderRadius:3,stack:'s'},
        {label:'Diesel',data:dlData,backgroundColor:'rgba(88,166,255,0.75)',borderRadius:3,stack:'s'},
      ]
    },
    options:{
      ...defaults,
      plugins:{...defaults.plugins},
      scales:{
        x:{...defaults.scales.x,stacked:true},
        y:{...defaults.scales.y,stacked:true,ticks:{...defaults.scales.y.ticks,callback:v=>v>=1000?(v/1000).toFixed(1)+'k ล.':v+' ล.'}}
      }
    }
  });

  }

function printReport(){const keys=getFilteredKeys();document.getElementById('print_subtitle').textContent=`พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')} · แสดง ${keys.length} กะ`;window.print();}
document.addEventListener('DOMContentLoaded',()=>{applyStoredTheme();});
</script>
